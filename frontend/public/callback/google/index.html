<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google OAuth Callback - Roolts</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #21262d 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #c9d1d9;
        }

        .callback-container {
            text-align: center;
            padding: 48px;
            background: rgba(13, 17, 23, 0.9);
            border-radius: 16px;
            border: 1px solid #30363d;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.4);
            max-width: 400px;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid #30363d;
            border-top-color: #4285F4;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 24px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .google-icon {
            font-size: 64px;
            margin-bottom: 24px;
        }

        h2 {
            font-size: 20px;
            margin-bottom: 12px;
            color: #f0f6fc;
        }

        p {
            font-size: 14px;
            color: #8b949e;
        }

        .success {
            color: #3fb950;
        }

        .error {
            color: #f85149;
        }
    </style>
</head>

<body>
    <div class="callback-container">
        <div class="google-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path
                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                    fill="#4285F4" />
                <path
                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                    fill="#34A853" />
                <path
                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                    fill="#FBBC05" />
                <path
                    d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                    fill="#EA4335" />
            </svg>
        </div>
        <div class="spinner" id="spinner"></div>
        <h2 id="status">Connecting to Google...</h2>
        <p id="message">Please wait while we complete the authentication.</p>
    </div>

    <script>
        (function () {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            const error = urlParams.get('error');

            const statusEl = document.getElementById('status');
            const messageEl = document.getElementById('message');
            const spinnerEl = document.getElementById('spinner');

            if (error) {
                spinnerEl.style.display = 'none';
                statusEl.textContent = 'Authentication Failed';
                statusEl.classList.add('error');
                messageEl.textContent = urlParams.get('error_description') || 'An error occurred during authentication.';
                return;
            }

            if (code) {
                // Send the code to the parent window
                if (window.opener) {
                    window.opener.postMessage({
                        type: 'google-auth-success',
                        code: code
                    }, '*');

                    spinnerEl.style.display = 'none';
                    statusEl.textContent = 'Connected Successfully!';
                    statusEl.classList.add('success');
                    messageEl.textContent = 'You can close this window now.';

                    // Auto-close after 2 seconds
                    setTimeout(() => {
                        window.close();
                    }, 2000);
                } else {
                    // Direct redirect mode (not popup)
                    statusEl.textContent = 'Redirecting...';
                    messageEl.textContent = 'Taking you back to Roolts.';
                    window.location.href = '/?google_code=' + code;
                }
            } else {
                spinnerEl.style.display = 'none';
                statusEl.textContent = 'Authentication Error';
                statusEl.classList.add('error');
                messageEl.textContent = 'No authorization code received.';
            }
        })();
    </script>
</body>

</html>
